<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  height:100%;
  overflow:hidden;
}

body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Noto Sans KR',sans-serif;

  /* MOBILE ONLY */
  max-width:500px;
  margin:auto;
  position:relative;

  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

#app{
  width:100%;
  height:100dvh;
  background:#000;
  overflow:hidden;
  position:relative;
}

/* =========================
   SCREEN
========================= */

.screen{
  position:absolute;
  inset:0;

  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  width:100%;
  height:100%;

  padding:5vw;
  background:#000;
}

.screen.active{
  display:flex;
}

/* =========================
   INTRO
========================= */

#welcome,
#intro{
  text-align:center;
}

.welcome-text{
  color:#b88cff;
  font-size:3.8vw;
  letter-spacing:2px;
  margin-bottom:3vw;

  opacity:0;
  animation:fadeIn .5s .3s forwards;
}

.korean-title{
  color:#fff;
  font-size:12vw;
  font-weight:700;
  letter-spacing:5px;

  opacity:0;
  animation:fadeIn .5s .7s forwards;
}

@keyframes fadeIn{
  to{
    opacity:1;
  }
}

/* =========================
   MAIN
========================= */

.hand-wrap{
  width:72vw;
  max-width:290px;
  aspect-ratio:3/4;

  overflow:hidden;
  border-radius:20px;

  margin-bottom:7vw;

  position:relative;
}

.hand-wrap video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.open-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:3vw;

  flex-wrap:wrap;
}

.korean-open{
  color:#fff;
  font-size:6vw;
  font-weight:700;
}

.english-open{
  color:#666;
  font-size:4vw;
}

.open-btn{
  border:none;
  outline:none;

  background:#8855ff;
  color:#fff;

  font-size:4vw;
  font-weight:600;

  padding:2.7vw 7vw;

  border-radius:999px;

  cursor:pointer;

  transition:.2s;
}

.open-btn:active{
  transform:scale(.94);
}

/* =========================
   CAMERA
========================= */

#camera{
  overflow:hidden;
}

#videoEl{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  object-fit:cover;
  z-index:1;
}

.cam-ui{
  position:absolute;
  inset:0;

  z-index:2;

  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.cam-top{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:5vw;
}

.cam-sq{
  width:5vw;
  height:5vw;

  border:2px solid rgba(255,255,255,.7);
  border-radius:3px;
}

.cam-flash{
  color:rgba(255,255,255,.8);
  font-size:6vw;
}

.cam-bottom{
  display:flex;
  justify-content:center;
  align-items:center;

  padding-bottom:8vw;
}

.rec-btn{
  width:20vw;
  height:20vw;

  max-width:82px;
  max-height:82px;

  border-radius:50%;

  background:rgba(0,0,0,.4);

  border:3px solid #d11;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  transition:.15s;
}

.rec-btn:active{
  transform:scale(.92);
}

.rec-btn svg{
  width:58%;
  height:58%;
}

.rec-btn.recording{
  animation:recPulse .8s infinite;
}

@keyframes recPulse{

  0%,100%{
    box-shadow:0 0 0 0 rgba(255,0,0,.45);
  }

  50%{
    box-shadow:0 0 0 12px rgba(255,0,0,0);
  }
}

.cam-ui::before{
  content:'';

  position:absolute;
  inset:0;

  background:
  radial-gradient(
    ellipse at center,
    transparent 45%,
    rgba(0,0,0,.55) 100%
  );

  pointer-events:none;
}

#noCam{
  position:absolute;
  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  z-index:3;

  color:#999;
  text-align:center;

  font-size:3.7vw;

  display:none;
}

/* =========================
   RESULT
========================= */

#result{
  text-align:center;
  gap:7vw;
}

.red-hand-wrap{
  width:72vw;
  max-width:290px;

  aspect-ratio:3/4;

  overflow:hidden;
  border-radius:20px;
}

.red-hand-wrap video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.wish-text{
  color:#ff2222;

  font-size:5.5vw;
  font-weight:700;

  letter-spacing:1px;
}

.back-btn{
  border:none;
  outline:none;

  background:#1c1c1c;
  color:#ccc;

  font-size:4vw;

  padding:2.7vw 7vw;

  border-radius:999px;

  cursor:pointer;
}

.back-btn:active{
  transform:scale(.94);
}

/* =========================
   DESKTOP BLOCK
========================= */

@media (min-width:700px){

  body::before{
    content:'Open this website on mobile';

    position:fixed;
    inset:0;

    background:#000;
    color:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:28px;
    z-index:99999;
  }

  #app{
    display:none;
  }
}
</style>

<div id="app">

  <!-- INTRO -->

  <div id="intro" class="screen active">

    <p class="welcome-text">
      Welcome to Girigo App
    </p>

    <p class="korean-title">
      기리고
    </p>

  </div>

  <!-- MAIN -->

  <div id="main" class="screen">

    <div class="hand-wrap">

      <video
        id="builtInVideo"
        src="video.mp4"
        autoplay
        loop
        muted
        playsinline>
      </video>

    </div>

    <div class="open-row">

      <span class="korean-open">
        열기
      </span>

      <span class="english-open">
        Open
      </span>

      <button class="open-btn" onclick="openCamera()">
        Open
      </button>

    </div>

  </div>

  <!-- CAMERA -->

  <div id="camera" class="screen">

    <video
      id="videoEl"
      autoplay
      muted
      playsinline>
    </video>

    <div id="noCam">

      카메라를 찾을 수 없습니다.
      <br>

      <small>Camera permission denied</small>

    </div>

    <div class="cam-ui">

      <div class="cam-top">

        <div class="cam-sq"></div>

        <div class="cam-flash">
          ⚡
        </div>

      </div>

      <div class="cam-bottom">

        <div
          class="rec-btn"
          id="recBtn"
          onclick="toggleRecord()">

          <svg viewBox="0 0 44 44" fill="none">

            <path d="M22 8 L14 28 L18 30 L22 14 Z" fill="#cc1111"/>

            <path d="M22 8 L30 28 L26 30 L22 14 Z" fill="#cc1111"/>

            <path d="M14 28 L18 30 L19 36 L13 35 Z" fill="#cc1111"/>

            <path d="M30 28 L26 30 L25 36 L31 35 Z" fill="#cc1111"/>

            <path d="M18 30 L26 30 L25 36 L19 36 Z" fill="#990000"/>

            <circle cx="22" cy="7" r="2" fill="#ff4444"/>

          </svg>

        </div>

      </div>

    </div>

  </div>

  <!-- RESULT -->

  <div id="result" class="screen">

    <div class="red-hand-wrap">

      <video
        src="video.mp4"
        autoplay
        loop
        muted
        playsinline
        style="filter:hue-rotate(120deg) saturate(2);">
      </video>

    </div>

    <p class="wish-text">
      Your wish has been fulfilled
    </p>

    <button class="back-btn" onclick="restart()">
      ↺ Restart
    </button>

  </div>

</div>

<script>

let stream = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;

function showScreen(id){

  document
    .querySelectorAll('.screen')
    .forEach(s => s.classList.remove('active'));

  document
    .getElementById(id)
    .classList.add('active');
}

setTimeout(() => {

  showScreen('main');

}, 2000);

async function openCamera(){

  showScreen('camera');

  try{

    stream = await navigator
      .mediaDevices
      .getUserMedia({

        video:{
          facingMode:'user'
        },

        audio:true
      });

    document
      .getElementById('videoEl')
      .srcObject = stream;

    document
      .getElementById('noCam')
      .style.display = 'none';

  }catch(err){

    document
      .getElementById('noCam')
      .style.display = 'block';
  }
}

function toggleRecord(){

  if(!isRecording){

    startRecord();

  }else{

    stopRecord();
  }
}

function startRecord(){

  if(!stream) return;

  recordedChunks = [];

  try{

    mediaRecorder = new MediaRecorder(stream,{
      mimeType:'video/webm;codecs=vp8,opus'
    });

  }catch(e){

    mediaRecorder = new MediaRecorder(stream);
  }

  mediaRecorder.ondataavailable = e => {

    if(e.data.size > 0){

      recordedChunks.push(e.data);
    }
  };

  mediaRecorder.onstop = onRecordStop;

  mediaRecorder.start(100);

  isRecording = true;

  document
    .getElementById('recBtn')
    .classList.add('recording');
}

function stopRecord(){

  if(mediaRecorder && isRecording){

    mediaRecorder.stop();

    isRecording = false;

    document
      .getElementById('recBtn')
      .classList.remove('recording');
  }
}

function onRecordStop(){

  if(stream){

    stream
      .getTracks()
      .forEach(track => track.stop());

    stream = null;
  }

  if(recordedChunks.length > 0){

    const blob = new Blob(recordedChunks,{
      type:'video/webm'
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');

    a.href = url;
    a.download = 'girigo_wish.webm';

    a.click();

    URL.revokeObjectURL(url);
  }

  setTimeout(() => {

    showScreen('result');

  }, 400);
}

function restart(){

  if(stream){

    stream
      .getTracks()
      .forEach(track => track.stop());
  }

  stream = null;

  isRecording = false;

  showScreen('intro');

  setTimeout(() => {

    showScreen('main');

  }, 2000);
}
</script>
